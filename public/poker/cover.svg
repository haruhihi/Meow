<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 350" width="250" height="350">
  <!-- 牌背背景 -->
  <rect width="100%" height="100%" rx="20" ry="20" fill="#d40000" stroke="white" stroke-width="10"/>
  
  <!-- 内部白色边框 -->
  <rect x="20" y="20" width="210" height="310" rx="15" ry="15" fill="none" stroke="white" stroke-width="5"/>
  
  <!-- 背面图案（菱形网格） -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <line x1="0" y1="0" x2="20" y2="20" stroke="white" stroke-width="2"/>
    <line x1="20" y1="0" x2="0" y2="20" stroke="white" stroke-width="2"/>
  </pattern>
  <rect x="25" y="25" width="200" height="300" fill="url(#grid)"/>
</svg>
